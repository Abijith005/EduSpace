<section class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="flex max-w-3xl p-5 shadow-lg bg-gray-100 rounded-2xl">
    <div class="w-1/2 sm:block hidden">
      <img
        class="rounded-2xl object-fill min-h-[534px]"
        src="../../../../assets/images/EduSpaceSignUp.jpeg"
        alt=""
      />
    </div>

    <div class="sm:w-1/2 px-10">
      <h2 class="font-bold text-2xl">Register</h2>

      <form action="" class="flex flex-col gap-4 text-sm">
        <input
          type="text"
          placeholder="User Name"
          class="rounded-xl p-2 mt-4"
        />

        <input type="email" placeholder="Email" class="rounded-xl p-2" />

        <input type="password" placeholder="password" class="p-2 rounded-xl" />

        <input
          type="password"
          placeholder="Confirm Password"
          class="p-2 rounded-xl"
        />
        <button class="bg-[#002D74] text-white rounded-xl py-2 mt-3 hover:scale-105 duration-300">
          Register
        </button>
      </form>

      <div
        class="mt-4 text-gray-400 grid grid-cols-3 items-center justify-center"
      >
        <hr class="border-gray-400" />
        <p class="text-sm text-center">OR</p>
        <hr class="border-gray-400" />
      </div>

      <div class="mt-4">
        <button
          class="flex text-sm items-center justify-center border py-2 w-full rounded-xl hover:scale-105 duration-300"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="mr-3"
            x="0px"
            y="0px"
            width="25px"
            viewBox="0 0 48 48"
          >
            <path
              fill="#fbc02d"
              d="M43.61/1,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12	s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20	s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
            ></path>
            <path
              fill="#e53935"
              d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039	l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
            ></path>
            <path
              fill="#4caf50"
              d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36	c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
            ></path>
            <path
              fill="#1565c0"
              d="M43.611,20.083L43.595,20L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571	c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"
            ></path>
          </svg>
          Sign Up with Google
        </button>
      </div>
      <div class="mt-4">
        <hr />
      </div>
      <div class="flex text-xs mt-3 justify-between items-center">
        <p>If you have account</p>
        <button class="py-2 px-8 border rounded-xl text-xs hover:scale-110 duration-300" [routerLink]="'../signIn'">Login</button>
      </div>
    </div>
  </div>
</section>
