<section class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-gray-100 flex rounded-2xl shadow-lg max-w-3xl p-5">
    <div class="sm:w-1/2 sm:px-8">
      <h2 class="font-bold text-2xl">Login</h2>
      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        class="flex flex-col gap-2"
      >
        <label
          [style.color]="
            isSubmitted && formControls['email'].errors ? 'red' : ''
          "
          class="mt-8 text-gray-400 text-sm"
          >{{
            isSubmitted &&
            formControls["email"].errors?.hasOwnProperty("required")
              ? "Email required"
              : isSubmitted &&
                formControls["email"].errors?.hasOwnProperty("pattern") 
              ? "Invalid email"
              : "Email"
          }}</label
        >
        <input
          type="text"
          class="p-2 rounded-xl border"
          formControlName="email"
          placeholder="example@gmail.com"
        />
        <div>
          <label
            [style.color]="
              isSubmitted && formControls['password'].errors ? 'red' : ''
            "
            class="mt-3 text-gray-400 text-sm"
            >{{
              isSubmitted &&
              formControls["password"].errors?.hasOwnProperty("required")
                ? "Password required"
                : isSubmitted &&
                  formControls["password"].errors?.hasOwnProperty("pattern")
                ? "Minimun 4 characters required"
                : "Password"
            }}</label
          >
        </div>
        <div class="relative">
          <input
            type="password"
            class="w-full p-2 rounded-xl border"
            placeholder="Password@123"
            formControlName="password"
            [type]="passwordVisibilty ? 'text' : 'password'"
          />
          <i
            [ngClass]="passwordVisibilty ? 'bi bi-eye-slash' : 'bi bi-eye'"
            class="absolute top-1/2 right-3 -translate-y-1/2 text-gray-500 cursor-pointer"
            (click)="showPassword()"
          ></i>
        </div>
        <div class="flex items-center justify-around mt-4">
          <button
            type="button"
            class="bb sm:h-8 h-6 sm:w-16 w-12"
            [ngClass]="{ box: role === 'user' }"
            (click)="selectRole('user')"
          >
            <h3 class="font-bold text-center text-sm">USER</h3>
          </button>
          <button
            type="button"
            class="bb sm:h-8 h-6 sm:w-16 w-12"
            (click)="selectRole('tutor')"
            [ngClass]="{ box: role === 'tutor' }"
          >
            <h3 class="font-bold text-center text-sm">TUTOR</h3>
          </button>
          <button
            type="button"
            class="bb sm:h-8 h-6 sm:w-16 w-12"
            [ngClass]="{ box: role === 'admin' }"
            (click)="selectRole('admin')"
          >
            <h3 class="font-bold text-center sm:text-sm text-xs">ADMIN</h3>
          </button>
        </div>
        <button
          class="bg-[#002D74] text-white rounded-xl py-2 hover:scale-105 duration-300 mt-4"
        >
          Login
        </button>
      </form>

      <div
        class="mt-3 text-gray-400 grid grid-cols-3 items-center justify-center"
      >
        <hr class="border-gray-400" />
        <p class="text-center text-sm">OR</p>
        <hr class="border-gray-400" />
      </div>

      <button
        class="mt-2 border py-2 bg-white w-full rounded-xl flex justify-center items-center text-sm hover:scale-105 duration-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="mr-3"
          x="0px"
          y="0px"
          width="25px"
          viewBox="0 0 48 48"
        >
          <path
            fill="#fbc02d"
            d="M43.61/1,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12	s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20	s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
          ></path>
          <path
            fill="#e53935"
            d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039	l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
          ></path>
          <path
            fill="#4caf50"
            d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36	c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
          ></path>
          <path
            fill="#1565c0"
            d="M43.611,20.083L43.595,20L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571	c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"
          ></path></svg
        >Login with Google
      </button>

      <div class="text-xs mt-2d border-b border-gray-400 py-3.5">
        <a href="">Forgot password ?</a>
      </div>

      <div class="mt-3 text-xs flex justify-between items-center">
        <p>If you don't have account</p>
        <button
          type="button"
          class="py-2 px-4 rounded-xl border hover:scale-110 duration-300 bg-white"
          [routerLink]="'../signUp'"
        >
          Register
        </button>
      </div>
    </div>

    <div class="w-1/2 sm:block hidden">
      <img
        class="rounded-2xl min-h-[534px]"
        src="./../../../../assets/images/EduSpaceLogin.jpeg"
        alt=""
      />
    </div>
  </div>
</section>
